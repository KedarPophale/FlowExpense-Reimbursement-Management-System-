<!-- templates/submit_expense.html -->
{% extends "base.html" %}
{% block content %}
<div class="max-w-2xl mx-auto">
    <div class="bg-white rounded-xl shadow-md p-8">
        <h1 class="text-2xl font-bold text-gray-800 mb-6">Submit New Expense</h1>
        
        <form method="POST" enctype="multipart/form-data" class="space-y-5">
            <div>
                <label class="block text-gray-700 font-medium mb-2">Amount ({{ company.currency }})</label>
                <div class="relative">
                    <span class="absolute left-3 top-3 text-gray-500">{{ company.currency_symbol }}</span>
                    <input type="number" step="0.01" name="amount" required class="w-full pl-8 pr-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-500">
                </div>
            </div>
            
            <div>
                <label class="block text-gray-700 font-medium mb-2">Category</label>
                <select name="category" required class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-500">
                    <option value="Meals & Entertainment">Meals & Entertainment</option>
                    <option value="Travel">Travel</option>
                    <option value="Office Supplies">Office Supplies</option>
                    <option value="Transportation">Transportation</option>
                    <option value="Accommodation">Accommodation</option>
                    <option value="Other">Other</option>
                </select>
            </div>
            
            <div>
                <label class="block text-gray-700 font-medium mb-2">Description</label>
                <textarea name="description" rows="3" required class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-500"></textarea>
            </div>
            
            <div>
                <label class="block text-gray-700 font-medium mb-2">Expense Date</label>
                <input type="date" name="expense_date" required class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-500">
            </div>
            
            <div>
                <label class="block text-gray-700 font-medium mb-2">Upload Receipt (OCR Supported)</label>
                <div class="border-2 border-dashed border-gray-300 rounded-lg p-6 text-center hover:border-purple-500 transition" id="dropzone">
                    <i class="fas fa-cloud-upload-alt text-4xl text-gray-400 mb-2"></i>
                    <p class="text-gray-500">Drag & drop or click to upload</p>
                    <input type="file" name="receipt" id="receiptInput" accept="image/*" class="hidden">
                    <button type="button" onclick="document.getElementById('receiptInput').click()" class="mt-2 px-4 py-2 bg-gray-100 rounded-lg text-sm">Select File</button>
                </div>
                <div id="ocrResult" class="mt-3 hidden bg-green-50 p-3 rounded-lg"></div>
            </div>
            
            <button type="submit" class="w-full gradient-bg text-white py-2 rounded-lg font-semibold hover:opacity-90 transition">
                Submit Expense
            </button>
        </form>
    </div>
</div>

<script>
    document.getElementById('receiptInput').addEventListener('change', async function(e) {
        const file = e.target.files[0];
        if (file) {
            const formData = new FormData();
            formData.append('receipt_image', file);
            
            const resultDiv = document.getElementById('ocrResult');
            resultDiv.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Scanning receipt...';
            resultDiv.classList.remove('hidden');
            
            try {
                const response = await fetch('/scan-receipt', {
                    method: 'POST',
                    body: formData
                });
                const data = await response.json();
                
                if (data.amount) {
                    document.querySelector('input[name="amount"]').value = data.amount;
                    document.querySelector('input[name="expense_date"]').value = data.date;
                    document.querySelector('textarea[name="description"]').value = data.description;
                    document.querySelector('select[name="category"]').value = data.category;
                    
                    resultDiv.innerHTML = `<i class="fas fa-check-circle text-green-500"></i> Receipt scanned! Amount: ${data.amount}, Merchant: ${data.merchant}`;
                }
            } catch (error) {
                resultDiv.innerHTML = '<i class="fas fa-exclamation-circle text-red-500"></i> OCR failed, please enter manually';
            }
        }
    });
</script>
{% endblock %}
